  text: 中西經星同異考
  hash: sha256:9ef7d46cce1814c8500ed42f62c52fb94beca468800154587bc4fae8e3726618
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0029_WYG_001-1a, image: WYG0795/WYG0795-0998c.png}
body:
  text: 發凡九則厯以齊七政也然非先定恒星即七政無從可齊故曰七政如乗傳恒星其地誌也七政如行棊恒星其楸局也曰恒者謂其終古不易也曰經者謂其不同緯星南北行也經亦有恒之義焉是編專以中西兩家所傳之星數星名考其多寡同異故曰經星星宫之書自黄帝始重黎羲和之後志天文者紛糅不一漢張衡云中外之宫常明者百有二十四可名者三百二十爲星二千五百微星之數葢萬一千五百二十至三國時太史令陳卓始列甘石巫咸三家所著星圖總二百八十三宫一千四百八十四星自唐以來厯家以儀象考測而宋兩朝志始能言某星去極若干度入某宿若干度爲說較詳此中國之學也西儒星學逺有端緒據厯書所譯周赧王丙寅古地末一測漢永和戊寅多禄某一測明嘉靖乙酉尼谷老一測萬厯乙酉第谷一測崇禎戊辰湯若望一測國朝康熈壬子南懐仁著儀象志又依東行歳差改定黄經及赤經緯今依南公志表稽其大小分爲六等一等大星一十有六二等星六十有八三等星二百有八四等星五百一十有二五等星三百四十有二六等星七百三十有二總計一千八百七十八星其微茫小星則不能以數計焉此泰西之學也按紀星數太西測算凡可見可状之星一千二十二若微小者或不常見者或䑃黒者不與焉凡四十八像其多寡大小不等在黄道北者二十一像一曰小熊二曰大熊三曰龍四曰皇帝五曰守熊人六曰北冕旒七曰熊人八曰琵琶九曰雁鵝十曰岳母十一曰大将十二曰御車十三曰醫生又曰逐蛇十四曰毒蛇十五曰箭十六曰日鳥十七曰魚将軍十八曰駒十九曰飛馬二十曰公主二十一曰三角形共在北者三百六十星一等三二等十八三等八十四四等一百七十四五等五十八六等十三昏者十在黄道中者十二像一曰白羊二曰金牛三曰雙兄四曰巨蟹五曰獅子六曰列女七曰天秤八曰天蝎九曰人馬十曰磨蝎十一曰寳瓶十二曰雙魚共在中者三百四十六星一等五二等九三等六十四四等一百三十四五等一百零六六等二十九昏者三在黄道南者十五像一曰海獸二曰獵户三曰天河四曰天鬼五曰大犬六曰小犬七曰船八曰水蛇九曰酒瓶十曰烏鴉十一曰半人牛十二曰豺狼十三曰大臺十四曰南冕十五曰南魚共在南者三百十六星一等七二等十八三等六十四等一百六十八五等五十三六等九昏者一三方共一千二十二星分其大小一等共十五二等共四十五三等共二百零八四等共四百七十四五等共二百十七六等共四十九昏者六十四夾漈鄭氏通志天文畧言漢晉諸志所載諸星名數灾祥叢雜難舉惟隋丹元子作步天歌句中有圖言下見象或豐或約無餘無失今依宋史及文獻通考於各垣各宿備採以誌之曰古歌回回厯立成所載有黄道經緯者止二百七十八星其繪圖者止十七座九十四星亦無赤道經緯西厯所測恒星黄赤二道經緯度分各各備具其歌相傳爲利瑪竇所譔謂之經天該與古歌不同而其星體大小位置以及無名微星亦瞭若指掌大致與恒星表相爲發明故亦附著古歌之後而别之曰西歌按經天該一作經天訣薄子珏撰古云北極出地三十六度南極入地三十六度者據伊洛一方而言也其實中土所見北極髙度自二十四度起至四十二度止則此兩極出入度内諸星即皆中土所見之星是編諸星凡離南極二十三度以上者仍録各宿下以資仰觀葢滇粤諸方在所必睹豈可泥前言而盡廢乎至南極諸星雖中土所不見據泰西氏皆其遊厯所經目睹詳測著有圖象今並録之但其歌偶闕因稍據圖表以補之云北直順天府經一百三十度少緯四十度大名府經一百二十五度緯三十六度少山東濟南府經一百二十八度太緯三十七度少青州府經一百三十一度少緯三十六度太泰山經一百三十度半緯三十六度度太登州府經一百三十二度緯三十七東平經一百二十八度緯三十六度十二度江南江寕府經一百二十八度緯三揚州府經一百二十九度緯三十三度太浙江杭州府經一百三十一度緯三十度山西太原府經一百二十二度緯三十七度恒山經一百二十五度緯三十九度河南開封府經一百二十四度緯三十四度河南府經一百二十二度緯三十四度嵩山經一百二十一度太緯三十三度二度湖廣武昌府經一百二十四度緯三十洞庭湖經一百二十三度緯二十八度衡山經一百二十三度緯二十六度少江西南昌府經一百二十六度緯二十九度吉安府經一百二十六度緯二十八度鄱陽湖經一百二十七度緯二十九度度福建福州府經一百三十度緯二十六建寕府經一百二十九度緯二十五度三度廣東廣州府經一百二十四度緯二十雷州府經一百二十一度緯二十度半瓊州府經一百二十一度緯十八度庾嶺經一百二十四度緯二十六度十六度廣西桂林府經一百二十一度緯二陜西西安府經一百十八度緯二十五度漢中府經一百十六度太緯三十三度洮州經一百十四度緯三十五度岷州經一百十四度緯三十五度四川成都府經一百十六度緯三十一度貴州貴陽府經一百十九度緯二十五度雲南雲南府經一百十五度緯二十四度恒星在天終古不變原亦無名自觀象者欲藉形以識星因取其與物相似者或一星或數十星分别立名聯綴成象而中西之同異斯出焉西域星象原與中國迥别今恒星表所載及經天該猶是中國星名但位座有無数目多寡稍異耳是編各星下分註兩行右中左西其中西名数並同者更不贅列其数雖不同而星名不異者即分註曰西幾星其表内有稱某星南某星北某星内外東西等字者俱以附近相從原非本星正数則亦附註曰西外増幾星其古無而西有者曰古無其西無而古有者曰西無其西圖雖有而西表則無者曰西表無古厯皆言堯時冬至日在虚漢唐在斗今在箕此黄道星有歳差之騐也西厯則謂黄道不動而七政恒星悉東行則普天經星皆依歳差遷改此各星入宿古今不同之故然步天歌原為初學仰觀而設故附近三垣各宿之星連類而及入宿淺深無暇詳求而亦非其所急也經天該作於利氏初入之時大致亦以三垣二十八宿為序畧同步天然於入宿之經度有加詳矣而以歳差東行間與今表亦有出入今於古歌之原入某宿而今實不同者於各星下註明原屬某宿以便稽考按經星之動微渺難窺以全厯推之崇禎癸未上距帝堯甲辰三千九百二十年共差五十八度則以六十八年零七月十三日三時差一度二萬五千一百有餘年共差三百六十五度有竒為一周天㳺子六曰崇禎癸未上距帝嚳甲子四千零二十年止差五十七度約一嵗差一分少九秒七十年零六月差一度二萬五千七百三十五年差一周天合而觀之中與西異中與中亦自有異西與中異西與西亦自有異或詳於志或列於表或載於圖或著於歌著撰之人不一占測之時各殊天度既有歳差步筭且多新智執古以疑今已為膠柱尊西而廢古亦昩源流今以兩說並存標其同異庶令仰觀者有所依據則専家之業以參互而愈明於學厯者不無小補云爾康熈己巳夏五月宣城後學梅文鼏謹識欽定四庫全書中西經星同異考卷上宣城梅文鼏撰紫微垣星序悉依古歌帝星一星庶子一星太子一星后宫一星天樞一星名北極外増一星西一四輔四星増一星西外天一一星太乙一星左樞一星上宰一星星西三少宰一星星西二上輔一星上弼西名少輔一星少弼二星外増二星西名上衛一星少衛一星増一星西外少丞一星少丞八以上左垣西作右樞一星少尉一星増一星西外上輔一星少輔一星増一星亦名隂徳西外上衛一星増三星西外少衛一星少衛六外増二星西作上丞一星上丞七以上右垣西作贊府一星西無隂徳二星星其一増少輔星西一尚書五星女史一星柱史一星御女四星西無天柱五星西無太理二星西無勾陳六星一星外増三星西十六甲六星星西一天皇大帝一星五帝内座五星西無華蓋九星星西四杠七星西無傳舎九星星西八内階六星天厨六星星外増二星西五八糓八星一星西十天棓五星星外増二星西七天床六星西無内厨二星西無文昌六星増一星西外三師三星増三星西外太尊一星増一星屬太微西外天牢六星星屬太微西一太陽守一星太微西屬四勢四星西無相一星増二星屬太微西外三公三星増一星西外𤣥戈一星星外増二星屬亢西三天理四星輔星一星星西三天樞一星増一星即文昌八西外天璇一星天璣一星天權一星増一星西外玉衡一星闓陽一星開陽西名揺光一星七星為北斗以上天槍三星増二星西外客星古無星萬厯癸酉始見西一近黄極六古無星西一古歌曰中元北極紫微宫北極五星在其中大帝之坐第二珠第三之星庶子居第一號曰皇太子四為后宫五天樞左右四星是四輔天乙太乙當門路左樞右樞夾南門兩面營衛一十五上宰少尉兩相對少宰上輔次少輔上衛少尉次上丞後門東邊大贊府門西喚作一少丞以次却向門前數隂徳門裏兩黄聚尚書以次其居五女史柱史各一户御女四星五天柱大理兩星隂徳邊勾陳尾指北極顚勾陳六星六甲前天皇獨在勾陳裏五帝内座後門是華蓋并杠十六星杠作柄象葢傘形蓋上連連九個明名曰傳舎如連丁垣外左右各六珠右是内階左天厨階前八星名八糓厨下五個天棓宿天牀六星左樞在内厨兩星右樞對文昌斗上半月形希疎分明六個星文昌之下曰三師大尊只向三師明天牢六星太尊邊太陽之守四勢前一個宰相太陽側更有三公相西偏即是𤣥戈一星圓天理四星斗裏暗輔星近著闓陽淡北斗之星七宿明第一主帝名樞精第二第三璇璣是第四名權第五衡闓陽揺光六七名揺光左三天槍星西歌曰垣髙先論極出地北向須尋不動䖏欲知眞極無本星列宿皆旋斯獨異近極小星强名極后宫庶子遙相類帝星最明太子次連極五星作斜勢帝下隂徳横兩烏極下四輔承四細勾陳七星中甚明離極三度認最易勾陳柄曲勾更曲勾内微星天皇帝太子上有無名星下方左樞少宰迎上宰少弼與上弼少衛上衛連少丞其中五位皆朗朗上下衛丞弼次明右邊右樞與左對太乙天乙顯微精少尉上輔次少輔上衛少衛共上丞右弼之内五尚書一微一顯三潜形尚書之後小明二左柱右女皆史稱上少丞間曰華蓋四黑兩兩遮北門弼外六星名天棓其曲似斗光頗明扶筐四星三畧暗天厨五星長方形二巨三小近少弼後有一顆無能名六星仰承名天鈎迤北第三光獨熒河中六星名造父三暗三微錯雜陳三隅纍纍曰王良尖角一珠微遜明良傍一顆名為䇿䇿後八星閣道稱三暗下連奎宿角二巨三細與䇿親附路一顆王良下適當壁宿上端停王良䇿星并閣道内有五箇光耀均五顆四在河虚䖏一條閣道穿河身閣道盡䖏横傳舎六星隱現斜直形右下七星名北斗天槍三星斗柄親三公三㸃與槍類斗柄之傍隱輔星天理四星斗内隱三師小星少輔隣文昌六星如半月東角下星光更清師昌之間名内階六星微茫兩簇分八糓九星一最著已盡紫微垣内星太微垣上相一星西上相外増一星西名次相一星西次相外増一星西名次將一星西次將西名上將一星西上將西名右執法一星以上西垣上將一星東上將西名次將一星東次將外増二星西名次相一星東次相西名上相一星東上相西名左執法一星以上東垣謁者一星三公三星九卿三星五諸侯五星西無内屏四星増四星西外五帝座五星幸臣一星太子一星從官一星郎將一星虎