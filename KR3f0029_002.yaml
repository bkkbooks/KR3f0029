body:
  text: 中西經星同異考卷下宣城梅文冪撰東方蒼龍七宿角宿去大角十度去極八十八度大角在紫微垣南門外三十七度角二星增五星西外平道二星天田二星增二星西外進賢一星星外增五星屬太微垣西三周鼎三星太微西屬天門二星增二星西外平星二星增一星一作屏星西外庫樓十星星外增一星西八柱十五星西九星衡四星作平衡西一南門二星一星屬亢西分馬腹古無星外增一星西三古歌曰兩星南北正直著中有平道上天田總是黑星兩相連别有一烏名進賢平道右畔獨淵然最上三星周鼎形角下天門左平星雙雙橫於庫樓上庫樓十星屈曲明樓中柱有十五星三三相著如鼎形其中四星别名衡南門樓外兩星橫西歌曰角宿兩星南最巨中間平道黑星二左右九點無名星天田二小角上對其頂正向搖光星天門兩黑角下是平星兩白不甚平庫樓七星展屏似樓內五小名平衡樓間六小作三柱樓下馬腹三星明南門小星當腹處亢宿去角十度去極九十一度亢四星增三星西外大角一星增一星西外折威七星西無右攝提三星星西四左攝提三星增一星西外頓頏二星頓頏分一星屬騎官西作陽門二星古歌曰四星恰似彎弓狀大角一星直上明折威七個亢下橫大角左右攝提星二三相對如鼎形折威下左頓頏星兩個斜安黃色精頏西二星號陽門色若頓頏直下存西歌曰亢宿四星兩端黑左邊無名附兩粒亢下大角懸明珠角上玄戈與斗直玄戈斜帶梗河三惟有南星光欲滴角東四星左攝提埀下一星芒熠熠角西四星右攝提迤北第三獨異色角下四小曰亢池形如方勝欹斜立亢下遙遙此頓頏四星微遜陽門白庫樓東角右來侵南門最明近南極氐宿去亢五度去極九十八度氐四星增五星西外天乳一星天市垣作巴增星西列招搖一星增一星西外梗河三星星外增五星屬亢西七帝席三星西無亢池六星星屬亢西四騎官二十七星內三車騎一頓頏西十四星陳車三星車騎三星騎官西入天輻二星騎陳將軍一星古歌曰四星似斗側量米天乳氐上一黑星世人不識稱無名一箇招搖梗河上梗河橫列三星上帝席三黑河之西亢池六星近攝提氐下衆星騎官出騎官之衆二十七三三相聚十欠一陳車氐下騎官次騎官下三車騎位天幅兩星立騎傍將軍陳裏振威霜西歌曰氐宿四明側斗形無名五點雜來侵上與七公明耀對類公北有招搖星兩星上與玄戈友下左復與貫索親索外無名多纍纍直下正當天市秦氐下二小陳車是天幅亦與車同輪平三平二皆車騎一明二暗騎將軍房宿去氐五度去極一百八度房四星增二星西外鍵閉一星鈎鈐二星星西一罰三星作伐西一西咸四星一名右咸池西五星外增三星東咸四星一名左咸池西外增一星日一星增一星西外從官二星古歌曰四星直下主明堂鍵閉一黃斜向上鈎鈐兩箇近其傍罰有三星直鈐上兩咸夾罰似房狀房下一星號為日從官兩箇日下出西歌曰房心尾共歌諺傳夏夜有星象儼如巨人冠進賢口鼻四星即房宿二三頗明下暗然當頭一點鈎鈐是鈐畔一微鍵閉言頭上雙星近者日冠前曲四是西咸沖冠三暗稱為伐冠後四黑名東咸當腹兩點積卒是稍前相似名從官心宿去房三度十三度去極一百心三星增二星西外積卒十二星屬房西二星古歌曰三星中央色最深下有積卒共十二三三相聚心下是西歌曰更有心三最明顯中巨旁微當背肩尾宿去心五度去極一百二十二度尾九星增一星西外龜五星星西四天江四星星外增二星西五傅説一星氣西作魚一星神宫一星古歌曰九星如鈎蒼龍尾下頭五點號龜星尾上天江四橫是尾東一星名傅説傅説東畔一魚子尾西一室是神宫所以列在后妃中西歌曰接星是尾九點曲卓如衣角飄風前神宫一星尾內坐傅説獨立尾之尖天江六點當河隙魚星一點遊江邊龜星有五三略見西去三星河外緣巨人側身向西北其上正當天市垣箕宿去尾四度去極一百十六度箕四星天舌二星西無木杵三星星外增一星屬尾西二粳粃一星古歌曰四星其狀似簸箕天舌二星箕口是箕下三星木杵隨箕前一點是粳粃明則歲豐暗為飢西歌曰箕星有四明相等大口如箕正向西當前一點粳粃黑何年簸向河之湄北方玄武七宿斗宿去箕闕度去極一百十度斗六星建星六星增一星西外天辨九星鱉十四星星西十三天雞二星增一星西外天籥八星西無狗國四星天淵十星以中六星作氣西圖狗二星增一星西外農丈人一星西無古歌曰六星其狀如北斗魁上建星六相等天辨建上三三九斗下圓安十四星雖然名鱉貫索形天雞建下雙黑星天籥柄前八黃精狗國四方雞下生天淵十星鱉東邊更有兩狗斗魁前農家丈人斗下眠天淵十黃狗色玄西歌曰箕背六星名斗宿北斗相方柄不如斗下曲圍十三點形肖其名鱉似龜天淵四微鱉所向狗國小方淵上圍國外雙鳥名曰狗其傍相似立天雞斗背六星稱作建下五微星若仰盂河中九點天辨斜兩􅉉中髙若髻堆辨上三星建河鼓中星獨巨三之魁鼓下四星天桴卧鼓傍各竪左右旗左旗曲七星皆小右旗亦七三揚輝奚仲四微臨輦道正在天津角上居牛宿去箕半度去極一百十度牛六星增二星內三星作氣西外天田九星西無九坎九星星屬女西四河鼓三星星外增七星西四織女三星星外增一星屬天市西四左旗九星六星外增七星西十右旗九星星外增二星西八天桴四星無西表羅堰三星星西二漸臺四星增二星屬天西外輦道五星星屬天市垣西四波斯古無一星歌無西十古歌曰六星近在河岸頭頭上雖然有兩角腹下從來欠一腳牛下九黑是天田田下三三九坎連牛上直建三河鼓鼓上三星號織女左旗右旗各九星河鼓兩畔右邊明更有四黃名天桴河鼓之下如連珠羅堰三烏牛東居漸臺四星似口形輦道東足連五下輦道漸臺在河滸欲得見時近織女西歌曰牛宿六星大小半一巨居中上下齊牛前二小名羅堰堰上匏瓜四粒珠匏下五星名敗瓜一粒等匏餘並微匏上跨河名天津四明二小一更欹天津之下十三小總屬無名不必疑女宿去牛五度去極一百度女四星亦曰嬃女西外增二星趙二星星西一周二星星西一秦二星星西一代二星星西一韓一星魏一星齊一星晉一星無西歌楚一星燕一星鄭一星越一星離珠五星西無匏瓜五星瓠瓜屬牛西作敗瓜五星牛西屬天津九星十八星外增五星屬牛西二奚仲四星星屬牛歌無西七扶筐七星星外增一星屬紫微垣西四平衡古無星表無西三古歌曰四星如箕主嫁娶十二諸侯在下陳先從趙國向東論東西兩周次二秦雍州南下雙雁門代國向西二縉紳韓魏一齊晉北輪楚之一國魏西屯楚城南畔獨燕軍燕西一郡與齊鄰齊北兩邑平原君欲知鄭在越下存十六黃星細區分五箇離珠女上勻敗瓜之上匏瓜生兩瓜各五匏瓜明天津九箇彈弓形兩星入牛河中橫四箇奚仲天津上七箇仲側扶筐星西歌曰女宿三微一稍白非方非斜形不侔右方數起趙與越周楚鄭齊燕一流並楚為秦並周代鄭星方在魏之頭魏韓相並望齊楚十星皆晦此舒眸下為九坎四可見平衡三白微難求離瑜三點均且直坎下四微散不收虛宿去女七度去極八十七度虛二星司命二星司祿二星無西歌司危二星星西一司非二星哭二星危西屬泣二星危西屬天壘城十三星外增二星西五星敗臼四星星西二離瑜三星星屬女西二古歌曰上下各一如連珠命祿危非虛上呈虛危之下哭泣星哭泣雙雙下壘城天壘團圓十三星敗臼四星城下橫臼西三箇離瑜明西歌曰虛宿兩星南最明南下圍三天壘城城下四方壁壘陳五顆獨有四顆清壁陳東行十三點彼端亦作小方形陳頭之下天錢繞稀微四點圓難成錢下二箇名敗臼臼下雙珠莫可名虛東一小名司命司危司非虛上承人星只有三星確六星車府射天津府上騰蛇六圍一兩尾八星遙對分危宿去虛六度去極八十三度危三星增一星西外人星五星星屬虛西四杵三星星西一臼四星星西三車府七星星外增三星屬虛西五天鈎九星星屬紫微垣西六造父五星星屬紫微垣西六墳墓四星虛梁四星天錢十星虛西屬蓋屋二星星西一古歌曰三星不直曲為之危上五黑號人星人左三四杵曲形人上七烏號車府府上天鈎九黃精鈎下五鴉字造父危下四星號墳墓墓下四星斜虛梁十箇天錢梁下黃墓傍兩星名蓋屋身著皂衣危下宿西歌曰危宿三星若罄折中間一點光微奪危下微光蓋屋名屋西三星墳墓接三箇晦明各自異四小虛梁墓左貼墓下雙烏哭泣臨一同土公墳後歇壘壁十二南橫遮羽林軍士縱橫列軍前統御有天綱北落師門光更烈危端臼杵四星懸其南敗臼半邊缺室宿去危十五度去極八十度室二星一作營室西外增一星離宫六星雷電六星增一星一作電霆西外壘壁陳十二星西屬虛羽林軍四十五星星內三鈇鉞屬危西二十六鈇鉞三星羽林軍西屬北落師門一星危西屬八魁九星西無天綱一星危表無西屬土公吏二星星歌無西一螣蛇二十二星星外增一星屬虛西一十六古歌曰兩星上有離宫出繞室三雙有六星下頭六箇雷電形壘壁陳次十二星十二兩頭大似升陳下分布羽林軍四十五卒三為羣東西兩下多難論仔細厯厯看區分三粒黃金名鈇鉞一顆珍珠北落門門東八魁九箇子門西一宿天綱是電傍兩黑土公吏螣蛇室上二十二西歌曰室宿兩箇光耀同無名一箇頂上沖室傍雙星共三座或小或大皆離宫雷霆六星惟右大霹靂曲五半朦朧雲雨平方四點小鈇鉞三小羽林中上頭直與螣蛇接其下復與火鳥逢壁宿去室十五度去極七十九度壁二星一作東壁西外增三星霹靂五星增三星西外雲雨四星天廄十星星西三鈇鑕五星星屬奎西七土公二星星西三火烏古無星表作火烏西十古歌曰兩星下頭是霹靂霹靂五星橫著行雲雨次之口四方壁上天廄十圓黃鈇鑕五星羽林傍土公兩黑壁下藏西歌曰壁宿二明與室似其上三星圍天廄廄上一顆附路稱其中正與王良對陳上雙烏有土公火鳥十星兩翼細西方白虎七宿奎宿去壁上星四度去極七十七度奎婁在紫微北門外三十六度奎十六星一星外增四星西二十外屏七星增二星西外天溷七星星西四土司空一星星西二軍南門一星婁西屬閣道六星星外增二星屬紫微垣西九附路一星紫微垣西屬王良五星星屬紫微垣西六策一星增一星屬紫微垣西外水委古無星西三古歌曰腰細頭尖似破鞋一十六星繞鞋生外屏七烏奎下橫屏下七箇天溷成司空右畔土之精奎上一宿軍南門河中六個閣道形附路一星道傍明五箇吐花王良星良星近上一策名天策天溷與外屏一十五星皆不明西歌曰奎宿十六連勝形東北一星芒獨異奎尖上與閣道通奎下七星外屏樹屏間五點不甚明兩箇揚輝屏盡處六箇天倉曲繞屏天溷二黑倉右附溷下一明土司空鈇鑕五小倉前地水委三星南極橫其左一星最明巨婁宿去奎大星八度去極七十度婁三星星外增三星西五左更五星星外增一星西六右更五星天倉六星八星外增一星屬奎西十天庾三星大將軍十一星星西作天大將軍十九外增三星古歌曰三星不勻近一頭左更右更烏夾婁天倉六箇婁下頭天庾三星倉東腳婁上十一將軍侯西歌曰婁三不均光甚均上疏下密雜星臨右更左更各五點並若懸弧兩翼分當頭數點弦弧似其名總曰天將軍弧中一𣲖光殊顯弧背一黑軍南門天庾三點天倉下芻藁六星左獨明胃宿去婁八度去極七十度胃三星增二星