body:
  text: 中西經星同異考天文算法類二推步之屬提要臣等謹案中西經星同異考二卷國朝梅文冪撰文冪字爾表宣城人與其兄文鼎皆精研厯算之學互相商榷多所發明此其所訂中西恆星名數也星經之最古者莫如巫咸甘石三家而其學失傳雖殘編尚存已不能知其端緒惟隋丹元子步天歌所列星象特為簡括故自宋以來天官家多據為凖繩逮明季厯法不驗而歐邏巴之法始行利瑪竇所撰經天該其名亦與中國相同而位座有無數目多寡與步天歌往往不合文冪因据南懷仁儀象志所載星名依步天次序臚列其目而以有無多寡之故分行詳注其下其古歌西歌亦各載原文於後以便檢核南極諸星為古所未及者則併據湯若望厯書及儀象志為考證補歌附之於末蓋七政之運行必憑恆星為考驗然在天成象天本無言隨人所標目為指名即據人所指名為測候指名不一則測驗多岐矣文冪此編獨詳稽異同參考互證使名實不病於參差是亦中西兩法互相貫通之要領也乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀中西經星同異考原序經星同異考一卷發凡九則吾季弟爾素之所手輯也歲在戊辰余歸自武林武林友人張慎碩忱能製西器手鋟銅字如書法之迅疾余乃依歲差考定平儀所用大星屬碩忱施之渾蓋而屬吾弟為作恆星黃赤二星圖因於星之經緯逐一詳校乃知湯氏厯書圖表與南氏儀象志互有得失自其本法固多違異不第與古傳殊也因取其星名之同而數有多寡異於古人者别識之以成此書至其所為辨正經緯之度者尚存别卷不盡於是而吾弟之為此則已勤矣蓋其時方有稿本次年巳巳余去京師五載至癸酉始歸山中吾弟乃出其繕寫重校之本示余視其年固己巳也甲戌中秋余乃為之序曰自堯典有四仲之星而斗牽牛織女參昴龍尾鳥帑天駟天黿之屬雜見於易詩春秋左傳國語至禮記月令大戴之夏小正稍具諸星伏見之節蓋星之有名其來逺矣古者觀天文以察時變敬授人時有厯有象圖書儀器宜莫不偹遭秦燔書棄先王之典羲和舊術無復可稽所僅遺者巫咸甘德石申之殘編而三家之傳各别司馬子長世為史官而天官厯書殊為闕略迄於後漢有張衡靈憲而器與書並亡自唐以後言觀象者率祖淳風晉隋兩志及丹元子步天歌今考其說又與天官書無不參錯不待西學之興而始多同異也西厯黃道十二象與中土異而回回厯與歐邏巴復自不同故雙女或以為室女隂陽或以為雙兄至黃道內外之星或以為六十象或以為六十二象而貫索一星回回厯以為缺碗歐邏巴以為冕旒其餘星名亦多互異豈非以占測之家非一而所傳異辭安得謂彼中厯學自上世以來永遵一術而初無更變哉今所傳經天該之圖與其歌皆因西象所列而變從中厯之星座星名即見界圖之分形其出似在厯書未成之前圖星以圓空去中法猶近然與步天歌仍有不同者或以西星合古圖而有疑似不敢輒定遂並收之而有增附之星或以古星求西圖而弗得其處不能強合遂芟去之而成古有今無之星要之皆徐李諸公譯西星而酌為之非西傳之舊余嘗見元趙緣督友欽石刻圖閣道六星在河中作磬折層階之象自天官書於營室言離宫閣道步天歌及晉隋宋三史並言六星而今圖表割其半為王良星别取河中雜小星聫綴附益之其星十餘而形直絶異舊圖又去營室更逺正抵奎婁而西象固原無所謂閣道也由是以推其意為更置者良已多矣且西厯言恆星有經度東行歲差而緯度終古如一然又言二至距緯古逺今近是黃極且有微移既言恆星之形略無改易然又言王良之側有萬厯癸酉年新出之星其說亦未能歸一也竊嘗譬之地志陵谷豈無小易而嶽瀆之大致自如然其名之所起亦人則為之而已矣禹治水惟九州而舜受終時肇十有二州肇之為言始也又况後世秦分為三十六郡唐分十道宋分十五路疆域代更圖志因之而改或者遂欲本桑欽之水經而駁禹貢亦見其惑矣然則宜何如君子於其所可知不厭求詳其所不知闕之而已義所可求當歸畫一其所難斷兩存之而已無泥古以疑今無執一以廢百謹守舊聞而無參意解此為學之方即著撰之法自古之學者莫不盡然而况天之髙星辰之逺哉是則吾弟為考之意也蓋其義例已具發凡中矣而余於是重有嘆也蓋自束髮受經於先君子孰師羅王賔先生往往於課餘晚步時指示以三垣列舍之狀余小子自是知星之可識而天為動物尋以從事制義未遑䆒精然心竊好之不幸先君子見背營求葬地不暇以他為無何余小子忽忽年近三十始從倪觀湖先生受臺官通軌算交食法稍稍推廣求之元史宋志溯唐及晋至於兩漢是時余及仲弟和仲與季弟爾素三人而已夜則披圖仰觀晝則運籌推步考訂前史三人者未嘗不共也如是者凡數年及余得中西之書圖稍多朋友之益漸廣而仲弟不幸已前卒久矣爾素於余所有之書手鈔略偹多所撰定然食指益衆家日益貧余兩人頻年授徙歲時相見不過數四頃余且為東西南北之人經年纍嵗羇棲於數百里數千里外欲如嚮者之相聚探討何可得哉何可得哉而余又善病且老矣雖嘗輯有古今厯法通考諸書妄自以為窺古人之意集諸家之長而性懶楷書又好增改稿與年積訖鮮定本其在京師感於李少司馬之言努力作為厯論六七十篇頗抒獨見其他算學新稿亦且盈尺而未能出以問世虛名之負纍謬為四方學者所知而欲傳之其人復求之不可得也竊不自揆欲略倣蘇湖遺軌設為義孰約鄊黨同學為讀書之事此志果就即當息影却掃於山村庶幾收拾纍年雜稿次第成帙稍存一得之愚以待來學則數十年癖嗜苦思亦或將有所歸著而凡事有天焉主之終不敢必其如何也且夫星同之學非小道也其事凌雜米鹽近於卜祝之為而探厥源流乃根於天人理數之極雷同俚近之言既不足以行逺而義類稍深索解人正復寥寥天下之大敢曰無人然亦有同志數輩逺在天涯合并匪易助余成此者不吾弟之望更誰望乎因弟此書俯仰今昔而兼有冀幸於將來不覺其言之長也康熙甲戌中秋勿葊梅文冪序中西經星同異考跋去年冬余侍安溪夫子於常之督學署中安溪示以所新鋟宣城梅定九先生厯學疑問三卷安溪學貫天人其推服定九先生以為治厯之學古今一人而已余云聞其弟爾素先生現授經於吾邑安溪躍然曰是能盡得定九之底藴者余歸甫弛裝即造先生先生示余以定九先生所著籌算諸書余深歎其精要先生孰課之餘覆玻璃於兩眼作細楷雖大寒暑不輟視之皆所撰天文書也長夏無事先生攜自著中西經星同異考一帙索題詞於余乘暇披閲見其搜比括次星名星數參差異同瞭然若掌紋之可數夫厯學之切於世用大矣而經家輒外之詭自髙寄以為言理而略數實憚其難且繁而已治厯者推步必以算而考七政之運行必以恆星夫理數之自然尚可以想悟取之至於星之數與名皆人區别而指稱之一彼一此所執各殊膠戾乖刺稍不辨章則梗於臆而礙於口初學者耳目不一心志為之不専遂至廢業者多矣即檢籍對核亦縻日耗力今睹先生之書詳而不雜簡而實盡殽列井然易以卒業雖以余之鈍且懶亦津津不倦焉真學厯者之梯航而通中西厯者之中馗也此當與定九先生之中西算學通如二曜雙行於天地之間編之蘭臺不獨為疇人星官所寶而吾儒之所藉以通天地人者咸於是覓鑰牡焉為書此以告吾黨無徒溺於華虛之詞而震於厯學之難且繁而不問業也至於作書之源流及纂輯之法則有定九先生之序與先生之發凡在何須淺學者之添足置喙哉戊寅立秋旦鍾吾徐用錫跋
